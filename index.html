<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Tarefas</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">
    <h1>Lista de Tarefas</h1>
    <p>Adicione suas tarefas!</p>
    <input type="text" id="input_tarefa" placeholder="Digite sua tarefa">
    <button onclick="adicionar_tarefa()">Adicionar Tarefa</button>
    <button onclick="limpar_lista()" class="botao_lista">Limpar tudo</button>
    <p id="mensagem"></p>
    <ul id="lista_tarefas"></ul>
  </div>

  <script src="script.js"></script>

</body>

</html>
